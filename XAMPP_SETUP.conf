# Warehouse Management System - XAMPP Virtual Host Configuration
# Copy this configuration to: C:\xampp\apache\conf\extra\httpd-vhosts.conf

<VirtualHost *:80>
    ServerName warehouse.local
    ServerAlias www.warehouse.local
    DocumentRoot "C:/xampp/htdocs/Warehouse-Management-System/public"
    
    <Directory "C:/xampp/htdocs/Warehouse-Management-System/public">
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog "logs/warehouse-error.log"
    CustomLog "logs/warehouse-access.log" common
</VirtualHost>

# Alternative: If you want to use localhost/warehouse instead of warehouse.local
# Uncomment the configuration below and comment out the one above

